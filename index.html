<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasklet Transcript App</title>
  <link rel="stylesheet" href="style.css">  
</head>
<body>
  <section id="auth-view" class="auth-shell" aria-live="polite">
    <div class="auth-card">
      <div class="auth-brand">
        <img class="auth-logo js-tasklet-logo" src="assets/tasklet-logo.png.png" alt="Tasklet">
        <h1>Transcript Hub</h1>
      </div>
      <p class="auth-subtitle">Sign in with your Tasklet account to access meeting data.</p>

      <p id="auth-status" class="auth-status" role="status">Checking session...</p>
      <p id="auth-error" class="auth-error" role="alert" hidden></p>

      <form id="login-form" class="auth-form">
        <label class="auth-field-group" for="login-email">
          <span>Email</span>
          <input id="login-email" class="auth-field" type="email" autocomplete="email" required>
        </label>
        <label class="auth-field-group" for="login-password">
          <span>Password</span>
          <input id="login-password" class="auth-field" type="password" autocomplete="current-password" required>
        </label>
        <button id="sign-in-button" class="primary-button" type="submit">Sign In</button>
      </form>
    </div>
  </section>

  <div id="app-shell" class="app" hidden>
    <aside class="sidebar" aria-label="Primary navigation">
      <div class="brand">
        <div class="brand-logo-wrap" aria-label="Tasklet" role="img">
          <img class="brand-logo js-tasklet-logo" src="assets/tasklet-logo.png.png" alt="Tasklet">
          <span class="brand-logo-fallback" aria-hidden="true">T</span>
        </div>
        <div class="brand-text">
          <h1>Tasklet</h1>
          <p>Transcript Hub</p>
          <span class="brand-fallback-text">Transcript App · Tasklet Factory</span>
        </div>
      </div>

      <nav class="navigation">
        <button class="nav-button active" type="button" data-section="dashboard">Dashboard</button>
        <button class="nav-button" type="button" data-section="meetings">Meetings</button>
        <button class="nav-button" type="button" data-section="customers">Customers</button>
        <button class="nav-button" type="button" data-section="partners">Partners</button>
        <button class="nav-button" type="button" data-section="participants">Participants</button>
        <button class="nav-button" type="button" data-section="actions">Actions</button>
        <button class="nav-button" type="button" data-section="dataManagement">Data Management</button>
        <button class="nav-button" type="button" data-section="import">Import Transcript</button>
      </nav>

      <div class="sidebar-footer">
        <p class="sidebar-footer-note">Use test data only while the repository is public.</p>
        <div class="auth-user-panel js-auth-user-panel" hidden>
          <p class="auth-user-email js-auth-user-email"></p>
          <div class="auth-user-meta">
            <span class="auth-role-badge js-auth-role-badge">User</span>
          </div>
          <p class="auth-user-warning js-auth-user-warning" hidden></p>
          <button class="secondary-button secondary-button--inverse js-auth-sign-out" type="button">Sign Out</button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <p class="eyebrow">Meeting knowledge base</p>
          <h2 id="page-title">Dashboard</h2>
        </div>

        <div class="topbar-actions">
          <label class="search-field" for="global-search">
            <span class="sr-only">Search meetings</span>
            <input id="global-search" type="search" placeholder="Search by meeting, customer, partner, or topic">
          </label>
          <button class="primary-button" type="button">Import Transcript</button>
        </div>
      </header>

      <section id="dashboard-view" class="view-panel" aria-labelledby="page-title"></section>
      <section id="meetings-view" class="view-panel" hidden></section>
      <section id="customers-view" class="view-panel" hidden></section>
      <section id="partners-view" class="view-panel" hidden></section>
      <section id="participants-view" class="view-panel" hidden></section>
      <section id="actions-view" class="view-panel" hidden></section>
      <section id="dataManagement-view" class="view-panel" hidden></section>
      <section id="import-view" class="view-panel" hidden></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="script.js"></script>
  </body>
</html>
